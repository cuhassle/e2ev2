<!DOCTYPE html><html lang="en"><head><title>E2Ev2 (by cuhassle)</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>:root{--bg-main:#2a2a2a;--bg-sec:#1e1e1e;--text-main:antiquewhite;--border-hov:antiquewhite;--btn-hov-bg:#444;--shadow:0 4px 12px rgba(0,0,0,0.3)}:root.light{--bg-main:#f0f0f0;--bg-sec:#ffffff;--text-main:#333;--border-hov:#333;--btn-hov-bg:#e0e0e0;--shadow:0 4px 12px rgba(0,0,0,0.1)}:root.hacker{--bg-main:#000;--bg-sec:#0a0a0a;--text-main:#0f0;--border-hov:#0f0;--btn-hov-bg:#111;--shadow:0 4px 12px rgba(0,255,0,0.1)}*{box-sizing:border-box;margin:0;padding:0;font-family:'Courier New',Courier,monospace;color:var(--text-main)}body,html{min-height:100vh;background-color:var(--bg-main)}#load{z-index:999;position:fixed;top:0;left:0;width:100%;height:100%;background-color:var(--bg-main);display:flex;align-items:center;justify-content:center}#navbar{height:55px;width:100%;background-color:var(--bg-sec);display:flex;align-items:center;padding:0 15px;position:fixed;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,0.2);border-bottom:1px solid rgba(255,255,255,0.05)}.navbar-div{display:flex;gap:10px;align-items:center}.right{margin-left:auto}#tabs{overflow-x:auto;overflow-y:hidden;white-space:nowrap;flex-grow:1;padding-right:15px;scrollbar-width:none}#tabs::-webkit-scrollbar{display:none}button{cursor:pointer;border:1px solid var(--border-hov);border-radius:8px;padding:6px 14px;background-color:var(--bg-sec);transition:all .2s ease;font-size:13px}button:hover{background-color:var(--btn-hov-bg)}#tabs button{display:inline-flex;align-items:center;gap:8px;margin-right:6px;background-color:var(--bg-main)}.close-tab{color:#f55;font-size:16px;background:0 0;border:none;cursor:pointer;padding:0;margin:0}.close-tab:hover{color:#f00;background-color:transparent;border:none}main{padding-top:75px;padding-bottom:20px;max-width:1200px;margin:0 auto;width:100%}#mainTitle{text-align:center;margin-bottom:20px;font-size:22px}#mainContainer{display:none;flex-wrap:wrap;justify-content:center;gap:20px;padding:0 15px}#mainContainer section{flex:1;min-width:300px;max-width:450px;background-color:var(--bg-sec);padding:20px;border-radius:12px;box-shadow:var(--shadow);display:flex;flex-direction:column;border:1px solid rgba(255,255,255,0.05)}#mainContainer section h2{margin-bottom:15px;text-align:center;font-size:18px}#mainContainer section b,#mainContainer section p{margin-bottom:6px;display:block;font-size:13px;opacity:.9}input[type=text],select,textarea{width:100%;background-color:var(--bg-main);border:1px solid rgba(255,255,255,0.1);padding:10px;border-radius:8px;margin-bottom:15px;resize:vertical;outline:0;font-size:13px;transition:border .2s}input[type=text]:focus,select:focus,textarea:focus{border:1px solid var(--border-hov)}input[type=file]{width:100%;background-color:var(--bg-main);border:1px dashed rgba(255,255,255,0.2);padding:10px;border-radius:8px;margin-bottom:15px;cursor:pointer;font-size:13px;transition:border .2s}input[type=file]:hover{border-color:var(--border-hov)}input[type=file]::file-selector-button{background-color:var(--bg-sec);border:1px solid var(--border-hov);color:var(--text-main);padding:4px 10px;border-radius:6px;cursor:pointer;margin-right:10px;font-size:12px;transition:background .2s}input[type=file]::file-selector-button:hover{background-color:var(--btn-hov-bg)}code{display:block;background-color:var(--bg-main);border:1px solid rgba(255,255,255,0.1);padding:10px;border-radius:8px;word-wrap:break-word;font-size:11px;margin-bottom:15px;cursor:pointer;min-height:40px}hr{border:0;border-top:1px solid var(--border-hov);margin:15px 0;opacity:.2}#history{display:none;flex-direction:column;gap:10px;background-color:var(--bg-sec);padding:20px;border-radius:12px;box-shadow:var(--shadow);margin:20px auto;max-width:800px;width:95%;max-height:350px;overflow-y:auto}.yourMessage{align-self:flex-start;background-color:var(--bg-main);padding:10px 14px;border-radius:12px 12px 12px 4px;border:1px solid rgba(255,255,255,0.1);max-width:85%;font-size:13px;line-height:1.4}.otherMessage{align-self:flex-end;background-color:var(--text-main);color:var(--bg-sec);padding:10px 14px;border-radius:12px 12px 4px 12px;max-width:85%;font-size:13px;line-height:1.4}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,0.7);backdrop-filter:blur(3px);z-index:100;overflow-y:auto;padding:20px;align-items:center;justify-content:center}#newTabModal{display:flex}.modal-content{background-color:var(--bg-sec);border:1px solid rgba(255,255,255,0.1);border-radius:12px;width:100%;max-width:450px;padding:25px;box-shadow:var(--shadow);animation:slideIn .2s ease-out}@keyframes slideIn{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}.modal-header h1{font-size:20px}.close{font-size:24px;cursor:pointer;background:0 0;border:none;padding:0;line-height:1;transition:color .2s}.close:hover{color:#f55;background:0 0}.modal-content label{display:block;margin-bottom:6px;font-weight:700;font-size:13px}.download-link{display:block;margin-top:10px;text-align:center;font-size:13px;text-decoration:underline;padding:8px;border-radius:8px;background-color:var(--bg-main);border:1px dashed var(--border-hov)}.download-link:hover{background-color:var(--btn-hov-bg)}</style></head><body><div id="load"><h1>Loading...</h1></div><div id="settingsModal" class="modal"><div class="modal-content"><div class="modal-header"><h1>Settings</h1><button type="button" class="close" onclick="closeSettingsModal()">&times;</button></div><label>Theme</label><select id="themeSelect" onchange="changeTheme()"><option value="dark">Dark (Default)</option><option value="light">Light</option><option value="hacker">Hacker</option></select><hr><label>Change this chat's public key</label><textarea id="newPublicKey" rows="3"></textarea><button type="button" id="changePublicKey" onclick="changePublicKey()" style="width:100%">Change Key</button><hr><div style="text-align:center"><p style="margin-bottom:10px;font-size:11px;opacity:0.7">May add exporting/importing later securely.</p><a href="https://github.com/cuhassle/e2ev2" target="_blank" style="text-decoration:underline;font-size:13px">Github</a></div></div></div><div id="newTabModal" class="modal"><div class="modal-content"><div class="modal-header"><h1>Start New Chat</h1><button type="button" class="close" onclick="closeModal()">&times;</button></div><label>Who are You Communicating With</label><input type="text" id="name-input" placeholder="Enter Their Name"><label>Enter Their Public Key</label><textarea id="key-input" placeholder="Paste Public Key Here" rows="4"></textarea><button type="button" id="createChat" onclick="createNewTab()" style="width:100%;margin-top:5px">Finish & Start Chat</button></div></div><nav id="navbar"><div id="tabs" class="navbar-div"></div><button type="button" id="addTab" onclick="openTabModal()">+ New Chat</button><div class="right navbar-div"><button type="button" id="copyPublicKey" onclick="copyPublicKey()">Copy Your Key</button><button type="button" id="settings" onclick="openSettingsModal()">⚙ Settings</button></div></nav><main><h1 id="mainTitle"></h1><div id="mainContainer"><section><h2>Encryption</h2><p>Enter Your Plaintext Message</p><textarea id="messageForEncryption" placeholder="Type a message..." oninput="tabs[activetab].plaintextMessage=this.value" rows="3"></textarea><button type="button" onclick="encrypt()">Encrypt Text</button><hr><p>Click to Copy:</p><div onclick="copyThis(document.getElementById('encryptedMessage'))"><code id="encryptedMessage">Your Encrypted Message Will Appear Here</code></div><hr><p><b>File Encryption</b></p><input type="file" id="fileEncryptInput"><button type="button" id="btnEncryptFile" onclick="encryptFile()">Encrypt File</button><div id="encryptDownloadArea"></div></section><section><h2>Decryption</h2><p>Enter Your Encrypted Message</p><textarea id="messageForDecryption" placeholder="Paste encrypted text here..." oninput="tabs[activetab].decryptBoxText=this.value" rows="3"></textarea><button type="button" onclick="decrypt()">Decrypt Text</button><hr><p>Decrypted Text:</p><div><textarea readonly id="decryptedMessage" rows="3">Your Decrypted Message Will Appear Here</textarea></div><hr><p><b>File Decryption</b></p><input type="file" id="fileDecryptInput"><button type="button" id="btnDecryptFile" onclick="decryptFile()">Decrypt File</button><div id="decryptDownloadArea"></div></section></div><div id="history"></div></main><script>function changeTheme(){document.documentElement.className="dark"===document.getElementById("themeSelect").value?"":document.getElementById("themeSelect").value}class tab{constructor(e,t){this.name=e;this.publicKey=t;this.secret=null;this.plaintextMessage="";this.encrypted="";this.decryptBoxText="";this.decrypted="";this.history=[]}}var tabs=[],activetab,tabBar=document.getElementById("tabs"),historyDiv=document.getElementById("history");function _arrayBufferToBase64(e){for(var t="",a=new Uint8Array(e),n=a.byteLength,r=0;r<n;r++)t+=String.fromCharCode(a[r]);return window.btoa(t)}function _base64ToArrayBuffer(e){for(var t=atob(e),a=new Uint8Array(t.length),n=0;n<t.length;n++)a[n]=t.charCodeAt(n);return a.buffer}var load=document.getElementById("load");function startload(){load.style.display="flex"}function doneload(){load.style.display="none"}window.onload=generateKeys;var publicKey,privateKey;async function generateKeys(){try{const e=await window.crypto.subtle.generateKey({name:"ECDH",namedCurve:"P-521"},!0,["deriveKey"]);privateKey=e.privateKey;let t=await window.crypto.subtle.exportKey("raw",e.publicKey);publicKey=_arrayBufferToBase64(t);doneload()}catch(e){alert("Cryptography initialization failed. Please ensure you are on HTTPS.")}}function copyPublicKey(){var e=document.getElementById("copyPublicKey");navigator.clipboard?navigator.clipboard.writeText(publicKey).then(()=>{e.innerText="Copied ✅";setTimeout(()=>e.innerText="Copy Your Key",1500)}):alert("Clipboard API blocked. Copying manually might be required.")}function copyThis(e){navigator.clipboard&&e.innerText&&"Your Encrypted Message Will Appear Here"!==e.innerText&&navigator.clipboard.writeText(e.innerText).then(()=>{let t=e.innerText;e.innerText="Copied ✅";setTimeout(()=>e.innerText=t,1500)})}async function shareSecret(e){return window.crypto.subtle.deriveKey({name:"ECDH",public:e},privateKey,{name:"AES-GCM",length:256},!0,["encrypt","decrypt"])}var messageForEncryption=document.getElementById("messageForEncryption"),encryptedMessage=document.getElementById("encryptedMessage"),messageForDecryption=document.getElementById("messageForDecryption"),decryptedMessage=document.getElementById("decryptedMessage");function renderHistory(){if(historyDiv.innerHTML="",null==activetab||0===tabs[activetab].history.length)return void(historyDiv.style.display="none");historyDiv.style.display="flex";tabs[activetab].history.forEach(e=>{let t=document.createElement("div");t.className=e.isYou?"yourMessage":"otherMessage";t.innerText=`${e.username}: ${e.message}`;historyDiv.appendChild(t)});historyDiv.scrollTop=historyDiv.scrollHeight}async function encrypt(){if(null==activetab)return alert("Open a chat first!");const e=messageForEncryption.value.trim();if(!e)return;const t=crypto.getRandomValues(new Uint8Array(12));var a=await window.crypto.subtle.encrypt({name:"AES-GCM",iv:t},tabs[activetab].secret,(new TextEncoder).encode(e));tabs[activetab].encrypted=_arrayBufferToBase64(t)+"."+_arrayBufferToBase64(a);tabs[activetab].history.push({username:"You",isYou:!0,message:e});renderHistory();tabs[activetab].plaintextMessage="";messageForEncryption.value="";encryptedMessage.innerText=tabs[activetab].encrypted}async function decrypt(){if(null==activetab)return alert("Open a chat first!");if(!messageForDecryption.value.includes("."))return alert("Invalid format. Must include '.' separating IV and Data.");const[e,t]=messageForDecryption.value.split(".");try{var a=await window.crypto.subtle.decrypt({name:"AES-GCM",iv:_base64ToArrayBuffer(e)},tabs[activetab].secret,_base64ToArrayBuffer(t));const n=(new TextDecoder).decode(a);tabs[activetab].decrypted=n;tabs[activetab].history.push({username:tabs[activetab].name,isYou:!1,message:n});renderHistory();messageForDecryption.value="";decryptedMessage.value=n}catch(e){alert("Decryption failed. Ensure the key is correct and the message isn't tampered with.")}}async function encryptFile(){if(null==activetab)return alert("Open a chat first!");const e=document.getElementById("fileEncryptInput"),t=document.getElementById("btnEncryptFile"),a=document.getElementById("encryptDownloadArea");if(!e.files.length)return alert("Please select a file to encrypt.");t.innerText="Encrypting...";t.disabled=!0;a.innerHTML="";try{const n=e.files[0],r=await n.arrayBuffer(),c=crypto.getRandomValues(new Uint8Array(12)),o=await window.crypto.subtle.encrypt({name:"AES-GCM",iv:c},tabs[activetab].secret,r),i=new Uint8Array(c.length+o.byteLength);i.set(c,0);i.set(new Uint8Array(o),c.length);const l=new Blob([i],{type:"application/octet-stream"}),s=window.URL.createObjectURL(l);window.lastEncUrl&&window.URL.revokeObjectURL(window.lastEncUrl);window.lastEncUrl=s;const d=document.createElement("a");d.href=s;d.download=n.name+".enc";d.innerText="✅ Click to Download "+n.name+".enc";d.className="download-link";a.appendChild(d);d.click();e.value=""}catch(e){alert("An error occurred during encryption. File might be too large.");console.error(e)}finally{t.innerText="Encrypt File";t.disabled=!1}}async function decryptFile(){if(null==activetab)return alert("Open a chat first!");const e=document.getElementById("fileDecryptInput"),t=document.getElementById("btnDecryptFile"),a=document.getElementById("decryptDownloadArea");if(!e.files.length)return alert("Please select a file to decrypt.");t.innerText="Decrypting...";t.disabled=!0;a.innerHTML="";try{const n=e.files[0],r=await n.arrayBuffer(),c=r.slice(0,12),o=r.slice(12),i=await window.crypto.subtle.decrypt({name:"AES-GCM",iv:c},tabs[activetab].secret,o),l=new Blob([i]),s=window.URL.createObjectURL(l);window.lastDecUrl&&window.URL.revokeObjectURL(window.lastDecUrl);window.lastDecUrl=s;const d=document.createElement("a");d.href=s;d.download=n.name.endsWith(".enc")?n.name.slice(0,-4):"decrypted_"+n.name;d.innerText="✅ Click to Download "+d.download;d.className="download-link";a.appendChild(d);d.click();e.value=""}catch(e){alert("Decryption failed! The key may be incorrect or the file corrupted.");console.error(e)}finally{t.innerText="Decrypt File";t.disabled=!1}}async function createNewTab(){var e=document.getElementById("name-input"),t=document.getElementById("key-input").value.trim();if(!t)return alert("You need a public key!");try{var a=await window.crypto.subtle.importKey("raw",_base64ToArrayBuffer(t),{name:"ECDH",namedCurve:"P-521"},!0,[])}catch(e){return alert("Invalid Public Key Format")}e.value||(e.value=`Person ${tabs.length+1}`);const n=new tab(e.value,t);tabs.push(n);activetab=tabs.length-1;closeModal();var r=document.createElement("button");r.type="button";r.innerHTML=`<span>${n.name}</span> <button type="button" class="close-tab">&times;</button>`;r.onclick=function(){openTab(tabs.indexOf(n))};r.querySelector(".close-tab").onclick=function(e){e.stopPropagation();closeTab(tabs.indexOf(n),r)};tabBar.appendChild(r);startload();n.secret=await shareSecret(a);doneload();openTab(activetab)}function openTab(e){activetab=e;document.getElementById("mainTitle").innerText=`Communicate Securely with ${tabs[e].name}`;document.getElementById("mainContainer").style.display="flex";messageForEncryption.value=tabs[e].plaintextMessage||"";messageForDecryption.value=tabs[e].decryptBoxText||"";encryptedMessage.innerText=tabs[e].encrypted||"Your Encrypted Message Will Appear Here";decryptedMessage.value=tabs[e].decrypted||"Your Decrypted Message Will Appear Here";renderHistory()}function closeTab(e,t){confirm("Are you VERY VERY SURE? This chat and its key will be lost.")&&(tabs.splice(e,1),t.remove(),document.getElementById("mainContainer").style.display="none",document.getElementById("mainTitle").innerText="",activetab=null,renderHistory())}async function changePublicKey(){var e=document.getElementById("newPublicKey").value.trim();if(!e)return alert("Please enter a new public key.");try{var t=await window.crypto.subtle.importKey("raw",_base64ToArrayBuffer(e),{name:"ECDH",namedCurve:"P-521"},!0,[]);document.getElementById("newPublicKey").value="";startload();tabs[activetab].secret=await shareSecret(t);tabs[activetab].publicKey=e;document.getElementById("changePublicKey").innerText="Key Updated ✅";setTimeout(()=>{document.getElementById("changePublicKey").innerText="Change Key"},1500);doneload()}catch(e){alert("Invalid key format.")}}function openTabModal(){document.getElementById("newTabModal").style.display="flex"}function closeModal(){document.getElementById("newTabModal").style.display="none";document.getElementById("name-input").value="";document.getElementById("key-input").value=""}function openSettingsModal(){document.getElementById("settingsModal").style.display="flex"}function closeSettingsModal(){document.getElementById("settingsModal").style.display="none"}window.addEventListener("beforeunload",function(e){e.preventDefault();e.returnValue=""});</script></body></html>
